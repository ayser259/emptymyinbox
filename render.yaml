services:
  - type: web
    name: empty-my-inbox-backend
    env: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r backend/requirements.txt && python backend/manage.py collectstatic --noinput
    startCommand: >
      cd backend &&
      python manage.py migrate &&
      gunicorn backend.wsgi:application
      --workers ${WEB_CONCURRENCY:-2}
      --threads ${GUNICORN_THREADS:-2}
      --timeout ${GUNICORN_TIMEOUT:-90}
      --graceful-timeout 30
      --max-requests 200
      --max-requests-jitter 50
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_DIRECT_CONNECT
        sync: false
      - key: DB_CONN_MAX_AGE
        value: "600"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://<your-service>.onrender.com"
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: "https://<your-frontend-domain>"
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: GMAIL_REDIRECT_URI
        sync: false
      - key: WEB_CONCURRENCY
        value: "2"
      - key: GUNICORN_THREADS
        value: "2"
      - key: GUNICORN_TIMEOUT
        value: "90"

  - type: worker
    name: empty-my-inbox-celery
    env: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r backend/requirements.txt
    startCommand: >
      cd backend &&
      celery -A backend worker --loglevel=info --concurrency ${CELERY_CONCURRENCY:-2}
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_DIRECT_CONNECT
        sync: false
      - key: DB_CONN_MAX_AGE
        value: "600"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://<your-service>.onrender.com"
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: "https://<your-frontend-domain>"
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: GMAIL_REDIRECT_URI
        sync: false
      - key: CELERY_CONCURRENCY
        value: "2"

